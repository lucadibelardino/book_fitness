name: Auto Book FreeFitness

on:
  schedule:
    # Runs at 23:00 UTC (00:00 Italy time)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run booking script
        env:
          CUSTORINO_USERNAME: ${{ secrets.CUSTORINO_USERNAME }}
          CUSTORINO_PASSWORD: ${{ secrets.CUSTORINO_PASSWORD }}
        run: |
          echo "Attendo 5 secondi prima di effettuare la prenotazione..."
          sleep 5
          python book_cus.py
