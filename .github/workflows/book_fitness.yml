name: Auto Book FreeFitness

on:
  schedule:
    # Runs at 22:50 UTC (23:50 Italy time) to account for GitHub Actions queue delays.
    # The Python script will then wait until exactly 00:00:01 before interacting.
    - cron: '50 22 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  book:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run booking script
        env:
          CUSTORINO_USERNAME: ${{ secrets.CUSTORINO_USERNAME }}
          CUSTORINO_PASSWORD: ${{ secrets.CUSTORINO_PASSWORD }}
        run: |
          python book_cus.py
